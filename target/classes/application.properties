spring.datasource.url=jdbc:mysql://mysql-aulaclick.alwaysdata.net:3306/aulaclick_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=aulaclick
# En lugar de poner la contraseña real, le decimos a Spring que busque una variable secreta
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Forzamos el dialecto para evitar el error de Render
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
